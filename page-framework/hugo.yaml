baseURL: "https://example.com/"
languageCode: "en-us"
title: "Page-framework"
defaultContentLanguage: en
disableDefaultLanguage: true

favicon: "/media/img/misc/ico.ico"

sitemap:
  changefreq: "monthly"
  priority: 0.5
  filename: "sitemap.xml"
module:
  imports:
  - path: 'github.com/theNewDynamic/gohugo-theme-ananke/v2'

languages:
  en:
    label: English
    locale: en-US
    menus:
      main:
      - name: Contact
        url: /en/contact/
        weight: 10
      - name: About
        url: /en/about/
        weight: 20
      - name: Debug
        url: /en/debug-page/
        weight: 30
    weight: 1
  pl:
    label: Polski
    locale: pl-PL
    menus:
      main:
      - name: Kontakt
        url: /pl/contact/
        weight: 10
    weight: 2