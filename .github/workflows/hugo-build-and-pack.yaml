name: Build Hugo and Store Artifact

on:
  push:
    branches:
      - main

jobs:
  build-and-archive:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.0'
          extended: true

      # 3️⃣ Build Hugo site
      - name: Build Hugo site
        run: hugo --minify --source page-framework --destination public

      # 4️⃣ Create timestamp
      - name: Set timestamp
        id: timestamp
        run: |
          echo "CURRENT_TIME=$(date '+%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      # 5️⃣ Zip the output
      - name: Package output
        run: |
          ZIP_NAME="out-${CURRENT_TIME}.zip"
          zip -r "$ZIP_NAME" public
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      # 6️⃣ Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: hugo-site-${{ env.CURRENT_TIME }}
          path: ${{ env.ZIP_NAME }}