name: Build Hugo and Publish Release

on:
  push:
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Hugo
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.0'
          extended: true

      # 3️⃣ Build Hugo site
      - name: Build Hugo site
        run: hugo --minify --source page-framework --destination page-framework/public

      # 4️⃣ Debug public folder
      - name: Debug public folder
        run: |
          ls -l page-framework
          pwd

      # 5️⃣ Set timestamp
      - name: Set timestamp
        id: timestamp
        run: echo "CURRENT_TIME=$(date '+%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

      # 6️⃣ Package output
      - name: Package output
        run: |
          ZIP_NAME="out-${CURRENT_TIME}.zip"
          zip -r "$ZIP_NAME" page-framework/public
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      # 7️⃣ Create Release
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: hugo-build-${{ env.CURRENT_TIME }}
          name: Hugo Build ${{ env.CURRENT_TIME }}
          body: "Automated build of Hugo site at ${{ env.CURRENT_TIME }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 8️⃣ Upload release asset
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}