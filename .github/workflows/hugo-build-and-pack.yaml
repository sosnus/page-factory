name: Build Hugo and Publish Release

on:
push:
branches:
- main

permissions:
contents: write

jobs:
build-and-release:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Hugo
    uses: peaceiris/actions-hugo@v3
    with:
      hugo-version: '0.160.0'
      extended: true

  - name: Build Hugo site
    run: hugo --minify --source page-framework --destination public

  - name: Debug public folder
    run: |
      pwd
      ls -la
      ls -la page-framework
      ls -la public || true

  - name: Set timestamp
    run: |
      echo "CURRENT_TIME=$(date '+%Y-%m-%d_%H-%M-%S')" >> $GITHUB_ENV

  - name: Package output
    run: |
      ZIP_NAME="out-${CURRENT_TIME}.zip"
      zip -r "$ZIP_NAME" public
      echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

  - name: Create Release and Upload Asset
    uses: softprops/action-gh-release@v2
    with:
      tag_name: hugo-build-${{ env.CURRENT_TIME }}
      name: Hugo Build ${{ env.CURRENT_TIME }}
      body: Automated build of Hugo site at ${{ env.CURRENT_TIME }}
      files: ${{ env.ZIP_NAME }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
